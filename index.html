<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>QR code component using flexbox and positioning</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
  }

    main {
      background: hsl(212, 45%, 89%);
      width: 80%;
      height: 600px;
      margin: 8% auto;
      display:flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0px 15px 10px 2px hsl(216, 15%, 86%);
    }

    section {
      background: hsl(0, 0%, 100%);
      height: 68%;
      width: 23%;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    img {
      width: 90%;
      position: absolute;
      top: 10px;
      border-radius: 15px;
    }

    p {
      width: 90%;
      font-family: Outfit,sans-serif;
      font-size: 18px;
      font-weight: 700;
      position: absolute;
      top: 260px;
      text-align: center;
    }

    #secP {
      font-weight: 400;
      position: absolute;
      font-size: 13px;
      top: 320px;
      color: hsl(216, 15%, 48%);
    }

    footer {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
      text-decoration: none;
    }

    a {
      text-decoration: none;
      color: hsl(240, 100%, 50%);
      font-size: 17px
    }

    a:hover {
      text-decoration: underline;
      transform: scale(1.1);
    }

  </style>

  </head>

  <body>

    <main>

      <section>
        <img src ="https://i.ibb.co/1t09c7cw/image-qr-code.png" alt="image qr code" border="0">
        <p>
          Improve your front-end skills by building projects
        </p>
        <p id ="secP">
          Scan the QR code to visit Frontend Mentor 
          and take your coding skills to the next level
        </p>
      </section>
    </main>

    <footer>
      <a href ="https://www.frontendmentor.io/">Visit Frontend Mentor</a>
      <a href ="mailto:adelihte@gmail.com?subject=Reach out website developer"> Reach out developer via Email</a>
    </footer>
  </body>
